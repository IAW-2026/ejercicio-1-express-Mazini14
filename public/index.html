<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1 class="logo">💬 Contacto</h1>
        </div>
    </nav>

    <main class="container">
        <section class="form-section">
            <h2>Envíanos tu mensaje</h2>
            <p class="subtitle">Rellena el formulario y nos pondremos en contacto contigo</p>

            <!-- Formulario que envía POST a /contacto -->
            <form action="/contacto" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="nombre">Nombre:</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        placeholder="Tu nombre completo" 
                        required>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje:</label>
                    <textarea 
                        id="mensaje" 
                        name="mensaje" 
                        placeholder="Escribe tu mensaje aquí..." 
                        rows="6" 
                        required></textarea>
                </div>

                <button type="submit" class="btn-submit">Enviar Mensaje</button>
            </form>

            <div class="info-box">
                <p><strong>ℹ️ Nota:</strong> Los datos se enviarán mediante POST al servidor y recibirás una confirmación.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Formulario de Contacto. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
